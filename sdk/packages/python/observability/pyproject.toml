[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "iii-observability"
version = "0.17.0"
description = "OpenTelemetry and logging primitives shared across iii SDKs."
authors = [{ name = "III" }]
license = { text = "Apache-2.0" }
readme = "README.md"
requires-python = ">=3.10"
keywords = ["iii", "observability", "opentelemetry", "logger"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
]
dependencies = [
    "opentelemetry-api>=1.25",
    "opentelemetry-sdk>=1.25",
    "httpx>=0.27",
    "websockets>=12.0",
]

[project.urls]
Homepage = "https://github.com/iii-hq/iii"
Repository = "https://github.com/iii-hq/iii"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=6.0",
    "pytest-httpx>=0.30",
    "mypy>=1.8",
    "ruff>=0.2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/iii_observability"]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
addopts = "--cov=src/iii_observability --cov-branch --cov-report=term-missing"
testpaths = ["tests"]
asyncio_mode = "auto"
