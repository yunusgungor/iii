[package]
name = "iii-sdk"
version = "0.17.0"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
authors = ["Motia LLC"]
description = "SDK for III Engine - a platform for building distributed applications"
repository = "https://github.com/iii-hq/iii"
homepage = "https://github.com/iii-hq/iii"
keywords = ["iii", "sdk", "engine", "distributed"]
categories = ["api-bindings", "asynchronous", "development-tools"]

[lib]
name = "iii_sdk"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
futures-util = "0.3"
hostname = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["unbounded_depth"] }
schemars = "0.8"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time", "net"] }
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-native-roots"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }

iii-observability = { workspace = true }

# HTTP client (non-traced; traced variant lives in iii-observability)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

[dev-dependencies]
ctor = "0.6.3"
opentelemetry = { version = "0.31" }
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio", "trace", "testing"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "multipart", "stream"] }
serial_test = "3"
tokio = { version = "1", features = ["test-util"] }
tracing-test = "0.2"
