name: Create Tag

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Release target'
        required: true
        type: choice
        options:
          - iii
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: 'Pre-release label (none = stable release)'
        required: true
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc
          - next
        default: none
      dry_run:
        description: 'Dry run (creates -dry-run.N tag, builds without publishing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  create-tag:
    name: Bump Versions & Create Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.III_CI_APP_ID }}
          private-key: ${{ secrets.III_CI_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Pre-flight checks
        env:
          TARGET: ${{ inputs.target }}
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [[ "$BRANCH" != "main" ]]; then
            echo "::error::Must be on main branch (currently on $BRANCH)"
            exit 1
          fi

          if [[ "$TARGET" == "iii" ]]; then
            for f in Cargo.toml \
                     engine/Cargo.toml \
                     sdk/packages/rust/iii/Cargo.toml \
                     sdk/packages/rust/observability/Cargo.toml \
                     sdk/packages/node/iii/package.json \
                     sdk/packages/node/iii-browser/package.json \
                     sdk/packages/node/observability/package.json \
                     sdk/packages/python/iii/pyproject.toml \
                     sdk/packages/python/observability/pyproject.toml \
                     console/packages/console-rust/Cargo.toml \
                     crates/scaffolder-core/Cargo.toml \
                     crates/motia-tools/Cargo.toml; do
              if [[ ! -f "$f" ]]; then
                echo "::error::$f not found"
                exit 1
              fi
            done
          fi

      - name: Calculate versions
        id: versions
        env:
          TARGET: ${{ inputs.target }}
        run: |
          if [[ "$TARGET" == "iii" ]]; then
            current_version_file="engine/Cargo.toml"
          else
            echo "::error::unknown target: $TARGET"
            exit 1
          fi

          python3 .github/scripts/calculate_release_version.py \
            --target "$TARGET" \
            --bump "${{ inputs.bump }}" \
            --prerelease "${{ inputs.prerelease }}" \
            ${{ inputs.dry_run && '--dry-run' || '' }} \
            --current-version-file "$current_version_file"

      - name: Update iii manifests
        if: inputs.target == 'iii' && inputs.dry_run != true
        env:
          NEW_VERSION: ${{ steps.versions.outputs.version }}
          PY_VERSION: ${{ steps.versions.outputs.python_version }}
        run: |
          python3 .github/scripts/bump_manifests.py \
            --root . \
            --version "${NEW_VERSION}" \
            --python-version "${PY_VERSION}"

      - name: Sync Cargo.lock
        if: inputs.target == 'iii' && inputs.dry_run != true
        run: cargo update --workspace

      - name: Validate version updates
        if: inputs.dry_run != true
        env:
          TARGET: ${{ inputs.target }}
          VERSION: ${{ steps.versions.outputs.version }}
          PY_VERSION: ${{ steps.versions.outputs.python_version }}
        run: |
          check_cargo() {
            local actual
            actual=$(grep '^version = ' "$1" | head -n1 | cut -d'"' -f2)
            if [[ "$actual" != "$2" ]]; then
              echo "::error::$1 version mismatch: expected $2, got $actual"
              exit 1
            fi
            echo "  $1 -> $actual"
          }

          check_json() {
            local actual
            actual=$(grep '"version":' "$1" | head -n1 | cut -d'"' -f4)
            if [[ "$actual" != "$2" ]]; then
              echo "::error::$1 version mismatch: expected $2, got $actual"
              exit 1
            fi
            echo "  $1 -> $actual"
          }

          check_workspace_dep() {
            local actual
            actual=$(grep -E "^iii-observability\s*=" "$1" | sed -E 's/.*version\s*=\s*"([^"]+)".*/\1/')
            if [[ "$actual" != "$2" ]]; then
              echo "::error::$1 iii-observability dep version mismatch: expected $2, got $actual"
              exit 1
            fi
            echo "  $1 iii-observability -> $actual"
          }

          check_pep440_pin() {
            local actual
            actual=$(grep -oE '"iii-observability==[^"]+"' "$1" | head -n1 | sed -E 's/.*==([^"]+)".*/\1/')
            if [[ "$actual" != "$2" ]]; then
              echo "::error::$1 iii-observability pin mismatch: expected $2, got $actual"
              exit 1
            fi
            echo "  $1 iii-observability -> $actual"
          }

          echo "Validating version updates..."

          if [[ "$TARGET" == "iii" ]]; then
            check_cargo "engine/Cargo.toml" "$VERSION"
            check_cargo "sdk/packages/rust/iii/Cargo.toml" "$VERSION"
            check_cargo "sdk/packages/rust/observability/Cargo.toml" "$VERSION"
            check_json "sdk/packages/node/iii/package.json" "$VERSION"
            check_json "sdk/packages/node/iii-browser/package.json" "$VERSION"
            check_json "sdk/packages/node/observability/package.json" "$VERSION"
            check_cargo "sdk/packages/python/iii/pyproject.toml" "$PY_VERSION"
            check_cargo "sdk/packages/python/observability/pyproject.toml" "$PY_VERSION"
            check_cargo "console/packages/console-rust/Cargo.toml" "$VERSION"
            check_cargo "Cargo.toml" "$VERSION"
            check_workspace_dep "Cargo.toml" "$VERSION"
            check_pep440_pin "sdk/packages/python/iii/pyproject.toml" "$PY_VERSION"
          fi

          echo "All versions validated."

      - name: Check tag does not exist
        env:
          TAG: ${{ steps.versions.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "iii-ci[bot]"
          git config user.email "iii-ci[bot]@users.noreply.github.com"

      - name: Commit and push
        if: inputs.dry_run != true
        env:
          TAG: ${{ steps.versions.outputs.tag }}
        run: |
          git add -A
          git commit -m "chore: bump versions for release -- ${{ inputs.target }}($TAG)"

          git push origin main

      - name: Create and push tag
        env:
          TAG: ${{ steps.versions.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created tag: $TAG"

      - name: Notify Slack
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "${{ inputs.dry_run == true && '[DRY RUN] ' || '' }}Tag created for release"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ inputs.dry_run == true && ':test_tube: *Dry Run — Tag Preview*' || ':label: *Tag Created*' }}\n\n:package: ${{ inputs.target }}: `${{ steps.versions.outputs.tag }}`\nPre-release: `${{ inputs.prerelease }}`\nTriggered by: ${{ github.actor }}${{ inputs.dry_run == true && '\n\n_No commits, tags, or publishes — validation only_' || '' }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
